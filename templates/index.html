<!DOCTYPE html>
<html>
<head>
<title>Iris Flower Prediction</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Iris Flower Prediction</h1>

<form action="/predict" method="post">

<label>Sepal Length</label><br>
<input type="text" name="sepal_length" value="{{sepal_length}}"><br><br>

<label>Sepal Width</label><br>
<input type="text" name="sepal_width" value="{{sepal_width}}"><br><br>

<label>Petal Length</label><br>
<input type="text" name="petal_length" value="{{petal_length}}"><br><br>

<label>Petal Width</label><br>
<input type="text" name="petal_width" value="{{petal_width}}"><br><br>

<button type="submit">Predict</button>

</form>

<h2>{{ prediction_text }}</h2>

</body>
</html>
